<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_LOGIN | type4u.qzz.io</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'VT323', monospace !important; }
        body { background-color: #020617; color: #4ade80; }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            border: 4px solid #4ade80;
            box-shadow: 8px 8px 0px #166534;
        }
        input {
            background: #000 !important;
            border: 4px solid #1e293b !important;
            color: #4ade80 !important;
        }
        input:focus { border-color: #4ade80 !important; }
        button {
            background: #4ade80 !important;
            color: #000 !important;
            border: 4px solid #166534 !important;
            box-shadow: 4px 4px 0px #064e3b;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-12 w-full max-w-md text-center">
        <h1 class="text-5xl font-black mb-6 text-green-400 uppercase tracking-tighter">RESTRICTED_ACCESS</h1>
        <p class="text-orange-400 text-xl mb-8 uppercase">[INPUT_CREDENTIALS_REQUIRED]</p>

        <form method="POST">
            <input type="password" name="password" placeholder="ENTER_PASSCODE" required
                   class="w-full px-4 py-4 mb-4 text-2xl outline-none">

            {% if error %}
            <p class="text-red-500 text-xl mb-4 uppercase">{{ error }}</p>
            {% endif %}

            <button type="submit" class="w-full py-4 text-3xl font-black uppercase transition-all active:translate-x-1 active:translate-y-1">
                ACCESS_SYSTEM
            </button>
        </form>
    </div>
</body>
</html>
